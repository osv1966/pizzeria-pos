<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cassa</title>
    <style>
        body{background:#f5f5f5;font-family:Arial;padding:10px}
        .griglia{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
        .tavolo{background:white;border-radius:12px;padding:10px;text-align:center;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
        .bordo-verde{border:3px solid #28a745}
        .bordo-rosso{border:3px solid #dc3545}
        .numero{font-size:20px;font-weight:bold}
        .stato{padding:8px;margin:8px 0;border-radius:30px;font-size:14px;font-weight:bold}
        .verde{background:#28a745;color:white}
        .rosso{background:#dc3545;color:white}
        .arancione{background:#fd7e14;color:white}
        .grigio{background:#6c757d;color:white}
        .count{font-size:12px;margin-top:4px;color:#ffd966}
        button{padding:8px 12px;margin:5px;border:none;border-radius:30px;cursor:pointer}
        .btn-verde{background:#28a745;color:white}
        .btn-rosso{background:#dc3545;color:white}
    </style>
</head>
<body>
    <h2>🍕 CASSA</h2>
    <div id="griglia"></div>
    <script>
        let API_URL='http://192.168.1.61:3000';
        
        function calcolaMinutiRimasti(ultimo,minuti){
            if(!ultimo||!minuti) return minuti||0;
            let fine=new Date(new Date(ultimo).getTime()+minuti*60000);
            let ora=new Date();
            return Math.max(0,Math.ceil((fine-ora)/60000));
        }
        
        function carica(){
            fetch(API_URL+'/api/stati-combinati')
                .then(r=>r.json())
                .then(data=>{
                    let html='';
                    for(let t of data){
                        let minC=calcolaMinutiRimasti(t.ultimo_aggiornamento,t.tempo_minuti);
                        let colore='grigio';
                        let testo='⏳ IN ATTESA';
                        let bottoni='';
                        let bordo='';
                        let countHtml='';
                        
                        if(t.stato_cassa==='accettato'){
                            colore='verde';
                            testo='✅ ACCETTATO';
                            bordo='bordo-verde';
                            countHtml=`<div class="count">⏱️ ${minC}min</div>`;
                        } else if(t.stato_cassa==='declinato'){
                            colore='rosso';
                            testo='❌ DECLINATO';
                            bordo='bordo-rosso';
                        } else if(t.stato==='lavorazione'){
                            colore='arancione';
                            testo='🔧 IN LAVORO';
                            countHtml=`<div class="count">⏱️ ${minC}min</div>`;
                            bottoni=`<div><button class="btn-verde" onclick="accetta(${t.tavolo_id})">✅ ACCETTA</button> <button class="btn-rosso" onclick="declina(${t.tavolo_id})">❌ DECLINA</button></div>`;
                        }
                        
                        html+=`<div class="tavolo ${bordo}">
                            <div class="numero">🍽️ Tavolo ${t.tavolo_id}</div>
                            <div class="stato ${colore}">${testo}</div>
                            ${countHtml}
                            ${bottoni}
                        </div>`;
                    }
                    document.getElementById('griglia').innerHTML=html;
                });
        }
        
        function accetta(tavolo){
            fetch(API_URL+'/api/cassa-rispondi/'+tavolo,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({azione:'accetta'})})
                .then(()=>carica());
        }
        
        function declina(tavolo){
            fetch(API_URL+'/api/cassa-rispondi/'+tavolo,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({azione:'declina'})})
                .then(()=>carica());
        }
        
        carica();
        setInterval(carica,3000);
    </script>
</body>
</html>
