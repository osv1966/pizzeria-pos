<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cassa</title>
    <style>
        *{box-sizing:border-box}
        body{background:#f5f5f5;padding:15px;margin:0;font-family:'Segoe UI',Arial}
        h1{color:#333;text-align:center;font-size:28px;margin:0 0 15px 0}
        .toolbar{display:flex;gap:15px;margin-bottom:20px;flex-wrap:wrap}
        .toolbar button{flex:1;padding:15px;border:none;border-radius:50px;font-size:18px;font-weight:bold;cursor:pointer}
        .btn-reset{background:#ff6b00;color:white}
        .btn-storico{background:#17a2b8;color:white}
        .griglia{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px}
        .tavolo{background:white;border-radius:20px;padding:15px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
        .numero{font-size:26px;font-weight:bold;margin-bottom:12px;color:#333;text-align:center}
        .reparto{background:#f8f9fa;border-radius:12px;padding:10px;margin:8px 0}
        .reparto-titolo{font-weight:bold;font-size:14px}
        .stato{font-size:13px;margin-top:4px}
        .attesa{color:#6c757d}
        .lavoro{color:#fd7e14;font-weight:bold}
        .pronto{color:#28a745;font-weight:bold}
        .btn-group{display:flex;gap:8px;margin-top:8px}
        .btn-accetta{background:#28a745;color:white;border:none;border-radius:40px;padding:8px;font-size:12px;cursor:pointer}
        .btn-declina{background:#dc3545;color:white;border:none;border-radius:40px;padding:8px;font-size:12px;cursor:pointer}
        .badge-verde{border:3px solid #28a745;box-shadow:0 0 8px #28a745}
        .footer{text-align:center;padding:20px;color:#666;font-size:12px}
    </style>
</head>
<body>
    <h1>🍕 CASSA - STATO TAVOLI</h1>
    <div class="toolbar">
        <button class="btn-reset" onclick="resetTavoli()">🔄 RESET</button>
        <button class="btn-storico" onclick="window.location.href='storico.html'">📜 STORICO</button>
    </div>
    <div class="griglia" id="griglia"></div>
    <div class="footer">🔄 Aggiornamento ogni 5 secondi</div>

    <script>
        let API_URL = 'http://192.168.1.61:3000';
        
        function calcolaMinutiRimasti(ultimoAgg, minutiTotali){
            if(!ultimoAgg || !minutiTotali) return minutiTotali || 0;
            let fine = new Date(new Date(ultimoAgg).getTime() + minutiTotali * 60000);
            let ora = new Date();
            return Math.max(0, Math.ceil((fine - ora) / 60000));
        }
        
        async function carica() {
            let res = await fetch(API_URL + '/api/stati-combinati');
            let tavoli = await res.json();
            let html = '';
            for (let t of tavoli) {
                let minP = calcolaMinutiRimasti(t.ultimo_pizzeria, t.tempo_pizzeria);
                let minC = calcolaMinutiRimasti(t.ultimo_cucina, t.tempo_cucina);
                let minF = calcolaMinutiRimasti(t.ultimo_friggitoria, t.tempo_friggitoria);
                
                let pBorder = t.stato_pizzeria === 'pronto' ? 'badge-verde' : '';
                let cBorder = t.stato_cucina === 'pronto' ? 'badge-verde' : '';
                let fBorder = t.stato_friggitoria === 'pronto' ? 'badge-verde' : '';
                
                html += `<div class="tavolo">
                    <div class="numero">🍽️ ${t.tavolo_id}</div>
                    
                    <div class="reparto ${pBorder}">
                        <div class="reparto-titolo">🍕 PIZZERIA</div>
                        <div class="stato">${t.stato_pizzeria === 'lavorazione' ? `<span class="lavoro">🔧 In lavoro ${minP}min</span>` : (t.stato_pizzeria === 'pronto' ? `<span class="pronto">✅ PRONTO</span>` : '<span class="attesa">⏳ In attesa</span>')}</div>
                        ${t.stato_pizzeria === 'lavorazione' ? `<div class="btn-group"><button class="btn-accetta" onclick="accettaReparto(${t.tavolo_id}, 'pizzeria')">✅ ACCETTA</button><button class="btn-declina" onclick="declinaReparto(${t.tavolo_id}, 'pizzeria')">❌ DECLINA</button></div>` : ''}
                    </div>
                    
                    <div class="reparto ${cBorder}">
                        <div class="reparto-titolo">🍔 CUCINA</div>
                        <div class="stato">${t.stato_cucina === 'lavorazione' ? `<span class="lavoro">🔧 In lavoro ${minC}min</span>` : (t.stato_cucina === 'pronto' ? `<span class="pronto">✅ PRONTO</span>` : '<span class="attesa">⏳ In attesa</span>')}</div>
                        ${t.stato_cucina === 'lavorazione' ? `<div class="btn-group"><button class="btn-accetta" onclick="accettaReparto(${t.tavolo_id}, 'cucina')">✅ ACCETTA</button><button class="btn-declina" onclick="declinaReparto(${t.tavolo_id}, 'cucina')">❌ DECLINA</button></div>` : ''}
                    </div>
                    
                    <div class="reparto ${fBorder}">
                        <div class="reparto-titolo">🍟 FRIGGITORIA</div>
                        <div class="stato">${t.stato_friggitoria === 'lavorazione' ? `<span class="lavoro">🔧 In lavoro ${minF}min</span>` : (t.stato_friggitoria === 'pronto' ? `<span class="pronto">✅ PRONTO</span>` : '<span class="attesa">⏳ In attesa</span>')}</div>
                        ${t.stato_friggitoria === 'lavorazione' ? `<div class="btn-group"><button class="btn-accetta" onclick="accettaReparto(${t.tavolo_id}, 'friggitoria')">✅ ACCETTA</button><button class="btn-declina" onclick="declinaReparto(${t.tavolo_id}, 'friggitoria')">❌ DECLINA</button></div>` : ''}
                    </div>
                </div>`;
            }
            document.getElementById('griglia').innerHTML = html;
        }
        
        async function accettaReparto(tavolo, reparto) {
            await fetch(API_URL + '/api/stati-' + reparto + '/' + tavolo, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ stato: 'pronto', tempo_minuti: null })
            });
            carica();
        }
        
        async function declinaReparto(tavolo, reparto) {
            await fetch(API_URL + '/api/stati-' + reparto + '/' + tavolo, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ stato: 'non_disponibile', tempo_minuti: null })
            });
            carica();
        }
        
        async function resetTavoli() {
            if(!confirm('⚠️ Resettare tutti i 60 tavoli?')) return;
            await fetch(API_URL + '/api/reset-tavoli', { method: 'POST' });
            carica();
        }
        
        carica();
        setInterval(carica, 5000);
    </script>
</body>
</html>
