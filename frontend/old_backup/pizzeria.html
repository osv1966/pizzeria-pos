<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzeria</title>
    <style>
        body{background:#1e2a3a;color:white;font-family:Arial;padding:10px}
        .griglia{display:grid;grid-template-columns:repeat(10,1fr);gap:5px}
        .tavolo{background:#3498db;padding:10px;border-radius:8px;text-align:center;cursor:pointer}
        .tavolo.selezionato{background:#ff6b00}
        .tavolo.lavoro{background:#fd7e14}
        .tavolo.pronto{background:#28a745}
        .tavolo.accettato{border:4px solid #28a745;box-shadow:0 0 10px #28a745}
        .badge-accettato{background:#28a745;padding:2px 6px;border-radius:12px;font-size:10px;margin-top:4px;display:inline-block}
        .pannello{position:fixed;bottom:0;left:0;right:0;background:#2c3e50;padding:10px;display:none;max-height:70%;overflow-y:auto}
        button{margin:5px;padding:10px;border-radius:8px;border:none;cursor:pointer}
        .btn-group{display:flex;gap:8px;flex-wrap:wrap}
        #tempi{display:none;margin-top:10px}
        .sezione{background:#1a2a3a;padding:10px;border-radius:10px;margin-bottom:10px}
        .sezione h3{margin:0 0 8px 0;color:#ff6b00}
        .frigg-btn{background:#fd7e14}
        .cucina-btn{background:#3498db}
    </style>
</head>
<body>
    <h2>🍕 PIZZERIA</h2>
    <div class="griglia" id="griglia"></div>
    <div class="pannello" id="pannello">
        <!-- SEZIONE CUCINA -->
        <div class="sezione">
            <h3>🍳 CUCINA</h3>
            <div class="btn-group">
                <button class="cucina-btn" onclick="setStato('pronto')">✅ PRONTO</button>
                <button class="cucina-btn" onclick="mostraTempi()">⏱️ LAVORO</button>
                <button class="cucina-btn" onclick="setStato('non_disponibile')">❌ NON DISP</button>
            </div>
            <div id="tempi" style="display:none; margin-top:8px;">
                <button class="cucina-btn" onclick="setStatoConTempo(10)">10 min</button>
                <button class="cucina-btn" onclick="setStatoConTempo(20)">20 min</button>
                <button class="cucina-btn" onclick="setStatoConTempo(30)">30 min</button>
                <button class="cucina-btn" onclick="setStatoConTempo(45)">45 min</button>
                <button class="cucina-btn" onclick="setStatoConTempo(60)">60 min</button>
                <button onclick="nascondiTempi()">Indietro</button>
            </div>
        </div>

        <!-- SEZIONE FRIGGITORIA -->
        <div class="sezione">
            <h3>🍟 FRIGGITORIA</h3>
            <div class="btn-group">
                <button class="frigg-btn" onclick="inviaFrigg('Patatine',1)">🍟 Patatine x1</button>
                <button class="frigg-btn" onclick="inviaFrigg('Patatine',2)">🍟 Patatine x2</button>
                <button class="frigg-btn" onclick="inviaFrigg('Patatine',3)">🍟 Patatine x3</button>
                <button class="frigg-btn" onclick="inviaFrigg('Crocchette',1)">🍡 Crocchette x1</button>
                <button class="frigg-btn" onclick="inviaFrigg('Crocchette',2)">🍡 Crocchette x2</button>
                <button class="frigg-btn" onclick="inviaFrigg('Crocchette',3)">🍡 Crocchette x3</button>
                <button class="frigg-btn" onclick="inviaFrigg('Panzerotto',1)">🥟 Panzerotto x1</button>
                <button class="frigg-btn" onclick="inviaFrigg('Panzerotto',2)">🥟 Panzerotto x2</button>
                <button class="frigg-btn" onclick="inviaFrigg('Panzerotto',3)">🥟 Panzerotto x3</button>
            </div>
        </div>

        <button onclick="annulla()" style="background:#6c757d; width:100%; margin-top:10px;">ANNULLA</button>
    </div>

    <script>
        let API_URL='http://'+window.location.hostname+':3000';
        let tavoloSelezionato=null;
        
        function parla(testo){
            let u=new SpeechSynthesisUtterance(testo);
            u.lang='it-IT';
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(u);
        }
        
        function mostraTempi(){
            document.getElementById('tempi').style.display='flex';
        }
        function nascondiTempi(){
            document.getElementById('tempi').style.display='none';
        }
        
        async function carica(){
            let res=await fetch(API_URL+'/api/stati-combinati');
            let tavoli=await res.json();
            let html='';
            for(let t of tavoli){
                let classe='';
                if(tavoloSelezionato===t.tavolo_id) classe+=' selezionato';
                if(t.stato_cucina==='lavorazione') classe+=' lavoro';
                if(t.stato_cucina==='pronto') classe+=' pronto';
                if(t.stato_cassa==='accettato') classe+=' accettato';
                
                let badge='';
                if(t.stato_cassa==='accettato') badge='<div class="badge-accettato">✅ Accettato</div>';
                
                html+=`<div class="tavolo${classe}" onclick="seleziona(${t.tavolo_id})">
                        ${t.tavolo_id}<br>${t.stato_cucina==="lavorazione" ? calcolaMinutiRimasti(t.ultimo_cucina, t.tempo_cucina)+"min" : (t.stato_cucina||"attesa")}
                        ${badge}
                    </div>`;
            }
            document.getElementById('griglia').innerHTML=html;
            document.getElementById('pannello').style.display=tavoloSelezionato?'block':'none';
        }
        
        function seleziona(id){
            tavoloSelezionato=id;
            carica();
        }
        
        async function setStato(stato,minuti=null){
            if(!tavoloSelezionato) return;
            let body={stato:stato};
            if(minuti) body.tempo_minuti=minuti;
            await fetch(API_URL+'/api/stati-pizzeria/'+tavoloSelezionato,{
                method:'PUT',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify(body)
            });
            if(stato==='pronto') parla(`Tavolo ${tavoloSelezionato}, pronto`);
            if(stato==='lavorazione' && minuti) parla(`Tavolo ${tavoloSelezionato}, lavoro ${minuti} minuti`);
            carica();
        }
        
        async function setStatoConTempo(minuti){
            await setStato('lavorazione', minuti);
            nascondiTempi();
        }
        
        async function inviaFrigg(prodotto,quantita){
            if(!tavoloSelezionato){alert('Seleziona un tavolo');return;}
            let ordine={tavolo:tavoloSelezionato,zona:'Sala',cliente:'',reparto:'friggitoria',prodotti:[{id:999,nome:prodotto,prezzo:0,quantita:quantita}]};
            await fetch(API_URL+'/api/ordini',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(ordine)});
            await fetch(API_URL+'/api/stati-friggitoria/'+tavoloSelezionato,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({stato:'lavorazione',tempo_minuti:5})});
            alert(`✅ ${prodotto} x${quantita} per Tavolo ${tavoloSelezionato}`);
            carica();
        }
        
        function annulla(){
            tavoloSelezionato=null;
            carica();
        }
        
        carica();
        setInterval(carica,3000);
    </script>
</body>
</html>
<script>
function calcolaMinutiRimasti(ultimoAgg, minutiTotali){
    if(!ultimoAgg || !minutiTotali) return minutiTotali || 0;
    let fine = new Date(new Date(ultimoAgg).getTime() + minutiTotali * 60000);
    let ora = new Date();
    let rimasti = Math.max(0, Math.ceil((fine - ora) / 60000));
    return rimasti;
}
</script>
<script>
function calcolaMinutiRimasti(ultimoAgg, minutiTotali){
    if(!ultimoAgg || !minutiTotali) return minutiTotali || 0;
    let fine = new Date(new Date(ultimoAgg).getTime() + minutiTotali * 60000);
    let ora = new Date();
    let rimasti = Math.max(0, Math.ceil((fine - ora) / 60000));
    return rimasti;
}

// Timer automatico per refresh countdown ogni minuto
setInterval(() => { carica(); }, 60000);
</script>
