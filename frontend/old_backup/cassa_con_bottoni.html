<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cassa</title>
    <style>
        *{box-sizing:border-box}
        body{background:#f5f5f5;padding:15px;margin:0;font-family:'Segoe UI',Arial}
        h1{color:#333;text-align:center;font-size:28px;margin:0 0 15px 0}
        .toolbar{display:flex;gap:15px;margin-bottom:20px;flex-wrap:wrap}
        .toolbar button{flex:1;padding:15px;border:none;border-radius:50px;font-size:18px;font-weight:bold;cursor:pointer}
        .btn-reset{background:#ff6b00;color:white}
        .btn-storico{background:#17a2b8;color:white}
        .griglia{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px}
        .tavolo{background:white;border-radius:20px;padding:15px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
        .numero{font-size:26px;font-weight:bold;margin-bottom:12px;color:#333;text-align:center}
        .riga{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;margin:6px 0;border-radius:16px;font-size:15px;font-weight:bold}
        .attesa{background:#3498db;color:white}
        .waiting{text-align:center;padding:12px;color:#999;font-size:14px}
        .btn-group{display:flex;flex-direction:column;gap:10px;margin-top:12px}
        .btn-accetta{background:#28a745;color:white;border:none;border-radius:60px;padding:12px;font-size:16px;font-weight:bold;cursor:pointer}
        .footer{text-align:center;padding:20px;color:#666;font-size:12px}
    </style>
</head>
<body>
    <h1>🍕 CASSA - STATO TAVOLI</h1>
    <div class="toolbar">
        <button class="btn-reset" onclick="resetTavoli()">🔄 RESET</button>
        <button class="btn-storico" onclick="window.location.href='storico.html'">📜 STORICO</button>
    </div>
    <div class="griglia" id="griglia"></div>
    <div class="footer">🔄 Aggiornamento ogni 5 secondi</div>

    <script>
        let API_URL = 'http://192.168.1.61:3000';
        
        function calcolaMinutiRimasti(ultimoAgg, minutiTotali){
            if(!ultimoAgg || !minutiTotali) return minutiTotali || 0;
            let fine = new Date(new Date(ultimoAgg).getTime() + minutiTotali * 60000);
            let ora = new Date();
            return Math.max(0, Math.ceil((fine - ora) / 60000));
        }
        
        async function carica() {
            let res = await fetch(API_URL + '/api/stati-combinati');
            let tavoli = await res.json();
            let html = '';
            for (let t of tavoli) {
                let minPizzeria = calcolaMinutiRimasti(t.ultimo_pizzeria, t.tempo_pizzeria);
                let minCucina = calcolaMinutiRimasti(t.ultimo_cucina, t.tempo_cucina);
                let minFrigg = calcolaMinutiRimasti(t.ultimo_friggitoria, t.tempo_friggitoria);
                let badgePizzeria = t.stato_pizzeria === 'accettato' ? '<span class="badge-accettato">✅ ACCETTATO</span>' : '';
                let badgeCucina = t.stato_cucina === 'accettato' ? '<span class="badge-accettato">✅ ACCETTATO</span>' : '';
                let badgeFrigg = t.stato_friggitoria === 'accettato' ? '<span class="badge-accettato">✅ ACCETTATO</span>' : '';
                let bordoPizzeria = t.stato_pizzeria === 'accettato' ? 'bordo-verde' : '';
                let bordoCucina = t.stato_cucina === 'accettato' ? 'bordo-verde' : '';
                let bordoFrigg = t.stato_friggitoria === 'accettato' ? 'bordo-verde' : '';
                html += `<div class="tavolo">
                    <div class="numero">🍽️ ${t.tavolo_id}</div>
                    <div class="riga attesa ${bordoPizzeria}">🍕 Pizzeria: ${t.stato_pizzeria === 'lavorazione' ? 'In lavoro ' + minPizzeria + 'min' : (t.stato_pizzeria || 'In attesa')} ${badgePizzeria}</div>
                    <div class="riga attesa ${bordoCucina}">🍔 Cucina: ${t.stato_cucina === 'lavorazione' ? 'In lavoro ' + minCucina + 'min' : (t.stato_cucina || 'In attesa')} ${badgeCucina}</div>
                    <div class="riga attesa ${bordoFrigg}">🍟 Friggitoria: ${t.stato_friggitoria === 'lavorazione' ? 'In lavoro ' + minFrigg + 'min' : (t.stato_friggitoria || 'In attesa')} ${badgeFrigg}</div>';
                if (t.stato_pizzeria === 'lavorazione') {
                    html += `<div class="btn-group"><button class="btn-accetta" onclick="accettaReparto(${t.tavolo_id}, 'pizzeria')">✅ ACCETTA</button><button class="btn-declina" onclick="declinaReparto(${t.tavolo_id}, 'pizzeria')">❌ DECLINA</button></div>`;
                }
                if (t.stato_cucina === 'lavorazione') {
                    html += `<div class="btn-group"><button class="btn-accetta" onclick="accettaReparto(${t.tavolo_id}, 'cucina')">✅ ACCETTA</button><button class="btn-declina" onclick="declinaReparto(${t.tavolo_id}, 'cucina')">❌ DECLINA</button></div>`;
                }
                if (t.stato_friggitoria === 'lavorazione') {
                    html += `<div class="btn-group"><button class="btn-accetta" onclick="accettaReparto(${t.tavolo_id}, 'friggitoria')">✅ ACCETTA</button><button class="btn-declina" onclick="declinaReparto(${t.tavolo_id}, 'friggitoria')">❌ DECLINA</button></div>`;
                }
                if (t.stato_pizzeria !== 'lavorazione' && t.stato_cucina !== 'lavorazione' && t.stato_friggitoria !== 'lavorazione') {
                    html += `<div class="waiting">⏳ In attesa ordini</div>`;
                }
                html += `</div>`;
            }
            document.getElementById('griglia').innerHTML = html;
        }
        
        async function accettaReparto(tavolo, reparto) {
            await fetch(API_URL + '/api/stati-' + reparto + '/' + tavolo, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ stato: 'pronto', tempo_minuti: null })
            });
            alert(`✅ Tavolo ${tavolo} - ${reparto} ACCETTATO`);
            carica();
        }
        
        async function resetTavoli() {
            if(!confirm('⚠️ Resettare tutti i 60 tavoli?')) return;
            await fetch(API_URL + '/api/reset-tavoli', { method: 'POST' });
            carica();
        }
        
        carica();
        setInterval(carica, 5000);
    </script>
</body>
</html>
<style>
.btn-group { display: flex; gap: 8px; margin-top: 12px; }
.btn-accetta { background: #28a745; color: white; border: none; border-radius: 60px; padding: 12px; font-size: 14px; font-weight: bold; cursor: pointer; flex: 1; }
.btn-declina { background: #dc3545; color: white; border: none; border-radius: 60px; padding: 12px; font-size: 14px; font-weight: bold; cursor: pointer; flex: 1; }
.badge-accettato { background: #28a745; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; display: inline-block; }
.bordo-verde { border: 3px solid #28a745; box-shadow: 0 0 8px #28a745; }
</style>
