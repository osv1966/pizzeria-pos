<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cucina</title>
    <style>
        body{font-family:Arial;background:#1e2a3a;padding:15px;margin:0}
        h1{color:#ff6b00;text-align:center}
        .stats{display:flex;gap:10px;justify-content:center;margin:15px 0}
        .stat-card{background:#2c3e50;padding:10px;border-radius:10px;color:white;text-align:center}
        .stat-card span{font-size:24px;font-weight:bold;display:block}
        .griglia{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-bottom:20px}
        .tavolo{background:#3498db;padding:10px;border-radius:10px;text-align:center;cursor:pointer;color:white}
        .tavolo.selected{background:#ff6b00}
        .tavolo.lavoro{background:#fd7e14}
        .tavolo.pronto{background:#28a745}
        .tavolo.non-disponibile{background:#dc3545}
        .numero{font-size:20px;font-weight:bold}
        .tempo{font-size:10px;margin-top:4px}
        .frigg-box{background:#2c3e50;padding:10px;border-radius:10px;margin:10px 0;text-align:center}
        .frigg-btn{background:#fd7e14;border:none;border-radius:20px;padding:8px 12px;margin:5px;color:white;cursor:pointer}
        .azione-panel{position:fixed;bottom:0;left:0;right:0;background:#2c3e50;padding:10px;border-top:2px solid #ff6b00;display:none}
        .btn-group{display:flex;gap:8px;flex-wrap:wrap}
        .btn{padding:10px;border:none;border-radius:30px;color:white;font-weight:bold;flex:1}
        .btn-verde{background:#28a745}
        .btn-arancio{background:#fd7e14}
        .btn-rosso{background:#dc3545}
        .btn-grigio{background:#6c757d}
        .btn-tempo{background:#17a2b8}
        .info-selezione{color:white;text-align:center;margin-bottom:8px}
    </style>
</head>
<body>
    <h1>👨‍🍳 CUCINA</h1>
    
    <div class="stats">
        <div class="stat-card">⏳ In attesa<br><span id="stat-attesa">0</span></div>
        <div class="stat-card">🔧 In lavoro<br><span id="stat-lavoro">0</span></div>
        <div class="stat-card">✅ Pronti<br><span id="stat-pronti">0</span></div>
    </div>
    
    <div class="griglia" id="griglia-tavoli"></div>
    
    <div class="frigg-box">
        <h3 style="margin:0 0 5px 0">🍟 FRIGGITORIA</h3>
        <div>
            <button class="frigg-btn" onclick="inviaFrigg('Patatine',1)">x1</button>
            <button class="frigg-btn" onclick="inviaFrigg('Patatine',2)">x2</button>
            <button class="frigg-btn" onclick="inviaFrigg('Patatine',3)">x3</button>
        </div>
    </div>
    
    <div class="azione-panel" id="azione-panel">
        <div class="info-selezione" id="info-selezione">0 selezionati</div>
        <div class="btn-group" id="btn-main">
            <button class="btn btn-verde" onclick="azione('pronto')">PRONTO</button>
            <button class="btn btn-arancio" onclick="mostraTempi()">LAVORO</button>
            <button class="btn btn-grigio" onclick="annulla()">ANNULLA</button>
        </div>
        <div id="tempi-box" style="display:none">
            <div class="btn-group">
                <button class="btn btn-tempo" onclick="azioneTempo(10)">10</button>
                <button class="btn btn-tempo" onclick="azioneTempo(20)">20</button>
                <button class="btn btn-tempo" onclick="azioneTempo(30)">30</button>
                <button class="btn btn-grigio" onclick="nascondiTempi()">←</button>
            </div>
        </div>
    </div>

    <script>
        let API_URL='http://'+window.location.hostname+':3000';
        let sel=[];
        
        async function carica(){
            let r=await fetch(API_URL+'/api/stati-combinati');
            let t=await r.json();
            let html='',a=0,l=0,p=0;
            for(let i of t){
                let cls='',txt='',tmp='';
                if(i.stato_cucina==='lavorazione'){cls='lavoro';txt='🔧';if(i.tempo_cucina)tmp=`<div class="tempo">${i.tempo_cucina}m</div>`;l++;}
                else if(i.stato_cucina==='pronto'){cls='pronto';txt='✅';p++;}
                else if(i.stato_cucina==='non_disponibile'){cls='non-disponibile';txt='❌';}
                else{cls='';txt='⏳';a++;}
                let s=sel.includes(i.tavolo_id)?'selected':'';
                html+=`<div class="tavolo ${cls} ${s}" onclick="selOnly(${i.tavolo_id})"><div class="numero">${i.tavolo_id}</div><div>${txt}</div>${tmp}</div>`;
            }
            document.getElementById('griglia-tavoli').innerHTML=html;
            document.getElementById('stat-attesa').innerText=a;
            document.getElementById('stat-lavoro').innerText=l;
            document.getElementById('stat-pronti').innerText=p;
            document.getElementById('info-selezione').innerText=sel.length+' selezionati';
            document.getElementById('azione-panel').style.display=sel.length?'block':'none';
        }
        
        function selOnly(id){sel=[id];carica();}
        function annulla(){sel=[];carica();}
        function mostraTempi(){document.getElementById('btn-main').style.display='none';document.getElementById('tempi-box').style.display='block';}
        function nascondiTempi(){document.getElementById('btn-main').style.display='flex';document.getElementById('tempi-box').style.display='none';}
        
        async function azione(stato){
            let id=sel[0];
            if(!id)return;
            await fetch(API_URL+'/api/stati-cucina/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({stato:stato})});
            carica();
        }
        
        async function azioneTempo(min){
            let id=sel[0];
            if(!id)return;
            await fetch(API_URL+'/api/stati-cucina/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({stato:'lavorazione',tempo_minuti:min})});
            nascondiTempi();
            carica();
        }
        
        async function inviaFrigg(p,q){
            let id=sel[0];
            if(!id){alert('Seleziona un tavolo');return;}
            await fetch(API_URL+'/api/ordini',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tavolo:id,zona:'Sala',cliente:'',reparto:'friggitoria',prodotti:[{id:999,nome:p,prezzo:0,quantita:q}]})});
            await fetch(API_URL+'/api/stati-friggitoria/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({stato:'lavorazione',tempo_minuti:3})});
            alert(p+'x'+q+' per Tavolo '+id);
            carica();
        }
        
        carica();
        setInterval(carica,3000);
    </script>
</body>
</html>
