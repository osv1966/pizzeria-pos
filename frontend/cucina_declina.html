<!DOCTYPE html>
<html>
<head>
    <title>Cucina</title>
    <style>
        body{background:#1a1a2e;color:white;font-family:Arial;padding:10px}
        .griglia{display:grid;grid-template-columns:repeat(10,1fr);gap:5px}
        .tavolo{background:#0f3460;padding:10px;border-radius:10px;text-align:center;cursor:pointer}
        .tavolo.selected{background:#ff6b00}
        .tavolo.lavoro{background:#fd7e14}
        .tavolo.accettato{border:3px solid #28a745}
        .tavolo.declinato{border:3px solid #dc3545}
        .badge{background:#28a745;padding:2px 6px;border-radius:12px;font-size:10px;margin-top:4px;display:inline-block}
        .badge-rosso{background:#dc3545;padding:2px 6px;border-radius:12px;font-size:10px;margin-top:4px;display:inline-block}
        .tempo{font-size:11px;color:#ffd966}
        .pannello{position:fixed;bottom:0;left:0;right:0;background:#2c3e50;padding:10px;display:none}
        button{padding:10px 15px;margin:5px;border-radius:10px;border:none;cursor:pointer}
    </style>
</head>
<body>
<h2>🍳 CUCINA</h2>
<div class="griglia" id="griglia"></div>
<div class="pannello" id="pannello">
    <button onclick="setStato('pronto')">✅ PRONTO</button>
    <button onclick="setStato('lavorazione',20)">⏱️ 20min</button>
    <button onclick="setStato('lavorazione',30)">30min</button>
    <button onclick="setStato('lavorazione',45)">45min</button>
    <button onclick="setStato('lavorazione',60)">60min</button>
    <button onclick="annulla()">ANNULLA</button>
</div>
<script>
let API_URL='http://192.168.1.61:3000';
let sel=null;

function calcolaMinutiRimasti(ultimo,minuti){
    if(!ultimo||!minuti) return minuti||0;
    let fine=new Date(new Date(ultimo).getTime()+minuti*60000);
    let ora=new Date();
    return Math.max(0,Math.ceil((fine-ora)/60000));
}

async function carica(){
    let res=await fetch(API_URL+'/api/stati-cucina');
    let tavoli=await res.json();
    let html='';
    for(let t of tavoli){
        let cls=(sel===t.tavolo_id)?'selected':'';
        let badge='';
        let tempoHtml='';
        if(t.stato==='lavorazione'){
            cls+=' lavoro';
            if(t.stato_cassa==='accettato'){ cls+=' accettato'; badge='<div class="badge">✅ Accettato</div>'; }
            if(t.stato_cassa==='declinato'){ cls+=' declinato'; badge='<div class="badge-rosso">❌ Declinato</div>'; }
            let r=calcolaMinutiRimasti(t.ultimo_aggiornamento,t.tempo_minuti);
            tempoHtml=`<div class="tempo">${r}min</div>`;
        }
        html+=`<div class="tavolo ${cls}" onclick="seleziona(${t.tavolo_id})">
            ${t.tavolo_id}
            ${tempoHtml}
            ${badge}
        </div>`;
    }
    document.getElementById('griglia').innerHTML=html;
    document.getElementById('pannello').style.display=sel?'block':'none';
}

function seleziona(id){sel=id;carica();}
function annulla(){sel=null;carica();}

async function setStato(stato,minuti=null){
    if(!sel) return;
    let body={stato:stato};
    if(minuti) body.tempo_minuti=minuti;
    await fetch(API_URL+'/api/stati-cucina/'+sel,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    carica();
}

carica();
setInterval(carica,4000);
</script>
</body>
</html>
