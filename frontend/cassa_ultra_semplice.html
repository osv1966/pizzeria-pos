<!DOCTYPE html>
<html>
<head>
    <title>Cassa</title>
    <style>
        body{background:#f5f5f5;font-family:Arial;padding:10px}
        .griglia{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
        .tavolo{background:white;border-radius:12px;padding:10px;margin:5px}
        .bordo-verde{border:3px solid #28a745}
        button{background:#28a745;color:white;border:none;border-radius:20px;padding:5px 10px;cursor:pointer}
    </style>
</head>
<body>
    <h2>🍕 CASSA</h2>
    <div id="griglia"></div>
    <script>
        let API_URL='http://192.168.1.61:3000';
        function carica(){
            fetch(API_URL+'/api/stati-combinati')
                .then(r=>r.json())
                .then(data=>{
                    let html='';
                    for(let t of data){
                        let bordo=t.stato_cassa==='accettato'?'bordo-verde':'';
                        let testo=t.stato_cassa==='accettato'?'✅ ACCETTATO':'⏳ In attesa';
                        html+=`<div class="tavolo ${bordo}">
                            <div><strong>Tavolo ${t.tavolo_id}</strong></div>
                            <div>🍔 CUCINA: ${testo}</div>
                            <button onclick="accetta(${t.tavolo_id})">✅ ACCETTA</button>
                        </div>`;
                    }
                    document.getElementById('griglia').innerHTML=html;
                });
        }
        function accetta(tavolo){
            fetch(API_URL+'/api/cassa-rispondi/'+tavolo,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({azione:'accetta'})})
                .then(()=>carica());
        }
        carica();
        setInterval(carica,5000);
    </script>
</body>
</html>
